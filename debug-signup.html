<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Debugging - CropCare</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background: #1a1a1a; color: #0f0; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #a4d65e; margin-bottom: 2rem; text-align: center; }
        .test-section { background: #222; border: 1px solid #a4d65e; padding: 1.5rem; margin-bottom: 1.5rem; border-radius: 8px; }
        .test-title { color: #a4d65e; font-weight: bold; margin-bottom: 1rem; font-size: 1.1rem; }
        textarea { background: #333; color: #0f0; border: 1px solid #a4d65e; padding: 1rem; width: 100%; margin: 1rem 0; height: 200px; border-radius: 4px; font-family: 'Courier New'; }
        button { background: #a4d65e; color: #000; border: 1px solid #a4d65e; padding: 0.7rem 1.5rem; margin: 0.5rem 0.5rem 0.5rem 0; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #8bc34a; }
        .result { background: #111; padding: 1rem; margin-top: 1rem; border-radius: 4px; border-left: 3px solid #a4d65e; max-height: 300px; overflow-y: auto; white-space: pre-wrap; word-wrap: break-word; }
        .success { border-left-color: #4ade80; color: #4ade80; }
        .error { border-left-color: #ef4444; color: #ef4444; }
        .info { border-left-color: #3b82f6; color: #3b82f6; }
        input { background: #333; color: #0f0; border: 1px solid #a4d65e; padding: 0.7rem; width: 100%; margin: 0.5rem 0; border-radius: 4px; font-family: 'Courier New'; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐛 Signup Debugging Tool</h1>
        
        <!-- Backend Connection Test -->
        <div class="test-section">
            <div class="test-title">1️⃣ Backend Connection Test</div>
            <button onclick="testBackendHealth()">Test Backend Connection</button>
            <div id="healthResult" class="result"></div>
        </div>

        <!-- API Client Test -->
        <div class="test-section">
            <div class="test-title">2️⃣ API Client Functions Test</div>
            <button onclick="testApiClientFunctions()">Check API Client Functions</button>
            <div id="apiClientResult" class="result"></div>
        </div>

        <!-- Simple Signup Test -->
        <div class="test-section">
            <div class="test-title">3️⃣ Signup API Test (Direct)</div>
            <input type="email" id="testEmail" placeholder="Email" value="testfarm@example.com">
            <input type="text" id="testName" placeholder="Name" value="Test Farmer">
            <input type="text" id="testAddress" placeholder="Address" value="123 Farm Lane">
            <input type="text" id="testCity" placeholder="City" value="Village">
            <input type="text" id="testContact" placeholder="Contact" value="9876543210">
            <input type="password" id="testPassword" placeholder="Password" value="password123">
            <button onclick="testSignupDirect()">Test Signup API</button>
            <div id="signupResult" class="result"></div>
        </div>

        <!-- Form HTML Test -->
        <div class="test-section">
            <div class="test-title">4️⃣ Actual Form Test</div>
            <button onclick="testActualForm()">Go to Form (form.html)</button>
            <div id="formResult" class="result info">Click above to test the actual signup form</div>
        </div>

        <!-- Console Logs -->
        <div class="test-section">
            <div class="test-title">5️⃣ Console Output</div>
            <button onclick="clearConsoleOutput()">Clear Console</button>
            <button onclick="downloadConsoleLog()">Download Log</button>
            <div id="consoleOutput" class="result info"></div>
        </div>
    </div>

    <script src="api-client.js"></script>
    <script>
        const consoleOutput = [];

        // Override console.log to capture output
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;

        console.log = function(...args) {
            originalLog.apply(console, args);
            const message = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)).join(' ');
            consoleOutput.push('✅ ' + message);
            updateConsoleDisplay();
        };

        console.error = function(...args) {
            originalError.apply(console, args);
            const message = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)).join(' ');
            consoleOutput.push('❌ ' + message);
            updateConsoleDisplay();
        };

        console.warn = function(...args) {
            originalWarn.apply(console, args);
            const message = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)).join(' ');
            consoleOutput.push('⚠️ ' + message);
            updateConsoleDisplay();
        };

        function updateConsoleDisplay() {
            document.getElementById('consoleOutput').textContent = consoleOutput.slice(-20).join('\n');
            document.getElementById('consoleOutput').style.maxHeight = '400px';
            document.getElementById('consoleOutput').scrollTop = document.getElementById('consoleOutput').scrollHeight;
        }

        function clearConsoleOutput() {
            consoleOutput.length = 0;
            document.getElementById('consoleOutput').textContent = '';
        }

        function downloadConsoleLog() {
            const log = consoleOutput.join('\n');
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(log));
            element.setAttribute('download', 'debug-log-' + new Date().getTime() + '.txt');
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        async function testBackendHealth() {
            try {
                const response = await fetch('http://localhost:5000/health');
                const data = await response.json();
                document.getElementById('healthResult').className = 'result success';
                document.getElementById('healthResult').textContent = JSON.stringify(data, null, 2);
                console.log('✅ Backend health check passed:', data);
            } catch (error) {
                document.getElementById('healthResult').className = 'result error';
                document.getElementById('healthResult').textContent = `❌ Error: ${error.message}\n\nMake sure:\n1. Backend is running on port 5000\n2. MongoDB is running\n3. You're accessing from http://localhost:5000`;
                console.error('❌ Backend health check failed:', error.message);
            }
        }

        function testApiClientFunctions() {
            const result = {
                'api-client.js loaded': typeof apiCall !== 'undefined',
                'signup function exists': typeof signup !== 'undefined',
                'login function exists': typeof login !== 'undefined',
                'showMessage function exists': typeof showMessage !== 'undefined',
                'validateEmail function exists': typeof validateEmail !== 'undefined',
                'isLoggedIn function exists': typeof isLoggedIn !== 'undefined',
                'getCurrentUser function exists': typeof getCurrentUser !== 'undefined',
                'API_BASE_URL': typeof API_BASE_URL !== 'undefined' ? API_BASE_URL : 'NOT DEFINED',
                'BACKEND_URL': typeof BACKEND_URL !== 'undefined' ? BACKEND_URL : 'NOT DEFINED'
            };
            
            const allGood = Object.values(result).every(v => v === true || typeof v === 'string');
            document.getElementById('apiClientResult').className = 'result ' + (allGood ? 'success' : 'error');
            document.getElementById('apiClientResult').textContent = JSON.stringify(result, null, 2);
            console.log('API Client functions check:', result);
        }

        async function testSignupDirect() {
            try {
                const data = {
                    name: document.getElementById('testName').value,
                    email: document.getElementById('testEmail').value,
                    address: document.getElementById('testAddress').value,
                    city: document.getElementById('testCity').value,
                    contact: document.getElementById('testContact').value,
                    password: document.getElementById('testPassword').value,
                    confirmPassword: document.getElementById('testPassword').value
                };

                console.log('📤 Sending signup request:', data);
                document.getElementById('signupResult').className = 'result info';
                document.getElementById('signupResult').textContent = 'Sending...';

                const response = await signup(data);
                
                console.log('📥 Signup response:', response);
                document.getElementById('signupResult').className = 'result success';
                document.getElementById('signupResult').textContent = '✅ Success!\n\n' + JSON.stringify(response, null, 2);
                showMessage('✅ ' + response.message, 'success');
            } catch (error) {
                console.error('❌ Signup failed:', error.message);
                document.getElementById('signupResult').className = 'result error';
                document.getElementById('signupResult').textContent = '❌ Error:\n\n' + error.message;
                showMessage('❌ ' + error.message, 'error');
            }
        }

        function testActualForm() {
            window.open('form.html', '_blank');
        }

        // Initial checks
        console.log('🚀 Debugging tool loaded');
        console.log('Testing api-client.js functions...');
        testApiClientFunctions();
        testBackendHealth();
    </script>
</body>
</html>
